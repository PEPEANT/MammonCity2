<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mammon City Host</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #06070d;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    .host-panel {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255, 215, 0, 0.12), transparent 32%),
        linear-gradient(180deg, #0f111c 0%, #06070d 100%);
    }

    .host-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <main class="host-panel" aria-label="Game Host Panel">
    <iframe
      id="game-host-frame"
      class="host-frame"
      title="Mammon City"
      allow="fullscreen"
      referrerpolicy="same-origin"
    ></iframe>
  </main>

  <script>
    const frame = document.getElementById("game-host-frame");
    const params = new URLSearchParams(window.location.search);
    const hash = window.location.hash || "";

    if (!params.has("dev")) {
      params.set("dev", "1");
    }

    const query = params.toString();
    const target = `./index.html${query ? `?${query}` : ""}${hash}`;

    frame.src = target;
  </script>
</body>
</html>
