<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배금도시</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/phone.css">
  <link rel="stylesheet" href="css/ranking.css">
</head>
<body>
  <div id="dev-panel" style="display:none">
    <div class="dev-title">DEV PANEL</div>

    <div class="dev-section days">
      <div class="dev-section-label">일차 이동</div>
    </div>

    <div class="dev-section stats">
      <div class="dev-section-label">행동 / 스탯</div>
    </div>

    <div class="dev-section state-dump">
      <div class="dev-section-label">현재 상태</div>
    </div>
  </div>

  <div id="game">
    <div id="main-area">
      <div id="bg" class="room"></div>
      <div id="buildings"></div>
      <div id="outside-goal"></div>
      <div id="actors-layer" aria-hidden="true"></div>
      <div id="character"></div>
      <div id="money-effect"></div>
      <div id="trash-game-layer" class="is-hidden" aria-hidden="true">
        <div id="trash-game-hud">
          <span id="trash-game-title">방청소</span>
          <span id="trash-remaining">0 / 0</span>
        </div>
        <div id="trash-items"></div>
      </div>

      <div id="statusbar">
        <div class="status-block">
          <span class="status-label">PLACE</span>
          <span class="status-value" id="player-display">부모님집</span>
        </div>
        <div class="status-block center">
          <span class="status-label">TODAY</span>
          <span class="status-value" id="day-display">1일차</span>
        </div>
        <div class="progress-wrap">
          <div id="progressbar"></div>
        </div>
        <div class="status-block end">
          <span class="status-label">현금</span>
          <span class="status-value money" id="money-display">0원</span>
        </div>
        <div class="status-block end">
          <span class="status-label">체력</span>
          <span class="status-value stamina" id="stamina-display">100</span>
        </div>
        <div class="status-block end">
          <span class="status-label">에너지</span>
          <span class="status-value energy" id="energy-display">100</span>
        </div>
        <div class="status-block end">
          <span class="status-label">TIME</span>
          <span class="status-value time" id="time-display">08:00</span>
        </div>
      </div>

      <div id="headline-strip">
        <span id="headline-badge" class="headline-badge">구인 속보</span>
        <span id="headline-text" class="headline-text">동네 구인 앱이 오늘 공고를 다시 밀어 올린다.</span>
      </div>

      <button id="memory-button" type="button" aria-expanded="false">
        <span class="memory-button-icon">기억</span>
        <span id="memory-count" class="memory-button-count">0</span>
      </button>

      <div id="memory-panel" hidden aria-hidden="true">
        <div class="memory-panel-header">
          <div>
            <div class="memory-panel-kicker">MEMORY LOG</div>
            <div class="memory-panel-title">기억</div>
          </div>
          <button id="memory-close-button" class="memory-close-button" type="button" aria-label="기억 닫기">닫기</button>
        </div>
        <div id="memory-list" class="memory-list"></div>
      </div>

      <div id="phone-stage" hidden aria-hidden="true"></div>

      <div id="phone-panel">
        <div class="phone-shell">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="phone-status-row">
              <span id="phone-time-display" class="phone-status-time">08:00</span>
              <span id="phone-status-signal" class="phone-status-signal">ONLINE</span>
            </div>

            <div id="phone-day-chip" class="phone-day-chip">DAY 01</div>

            <div id="phone-apps" class="phone-apps"></div>

            <div id="phone-app-screen" class="phone-app-screen" hidden></div>
          </div>

          <div id="phone-controls" aria-label="Phone controls">
            <button id="phone-stage-btn" class="phone-control-btn" type="button" aria-pressed="false">
              <span class="phone-control-icon" aria-hidden="true">⛶</span>
              <span class="phone-control-label">확대</span>
            </button>
            <button id="phone-home-btn" class="phone-control-btn is-home" type="button" aria-expanded="false">
              <span class="phone-control-icon" aria-hidden="true"></span>
              <span class="phone-control-label"></span>
            </button>
            <button id="phone-back-btn" class="phone-control-btn" type="button">
              <span class="phone-control-icon" aria-hidden="true">↩</span>
              <span class="phone-control-label">뒤로</span>
            </button>
          </div>
        </div>
      </div>

      <div id="textbox">
        <div class="textbox-top">
          <div id="speaker">구인 속보</div>
          <div id="scene-tags" class="scene-tags"></div>
        </div>
        <div id="message"></div>
        <div id="choices"></div>
      </div>
    </div>

    <div id="start-screen">
      <div class="start-card">
        <div class="start-title">배금도시</div>
        <div class="start-sub">
          30일동안 돈을 모으세요.
        </div>
        <input id="name-input" class="name-input" type="text" maxlength="10" placeholder="닉네임">
        <div class="start-actions">
          <button id="continue-button" class="start-btn start-btn-secondary" type="button" hidden>이어하기</button>
          <button id="start-button" class="start-btn" type="button">시작하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 랭킹 전체화면 오버레이 -->
  <div id="ranking-screen" hidden aria-hidden="true">
    <div class="ranking-inner">
      <div class="ranking-header">
        <div class="ranking-title">배금도시</div>
        <div class="ranking-subtitle">7일 결산 · 전국 랭킹</div>
      </div>
      <div class="ranking-my-card" id="ranking-my-card"></div>
      <div class="ranking-list-wrap">
        <table class="ranking-table">
          <thead>
            <tr>
              <th>순위</th>
              <th>이름</th>
              <th>현금</th>
              <th>직업</th>
              <th>랭크</th>
            </tr>
          </thead>
          <tbody id="ranking-list"></tbody>
        </table>
      </div>
      <div class="ranking-actions">
        <button id="ranking-restart-btn" class="ranking-btn" type="button">처음부터 다시 하기</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    // Firebase 설정 — Firebase Console에서 발급받은 값으로 교체하세요
    // https://console.firebase.google.com → 프로젝트 생성 → 웹 앱 등록 → config 복사
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID",
    };
    if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
      firebase.initializeApp(firebaseConfig);
      window.__FIREBASE_CONFIG_SET__ = true;
    }
  </script>

  <script src="js/data/jobs/jobs-data.js"></script>
  <script src="js/data/jobs/job-headlines-data.js"></script>
  <script src="js/data/jobs/service-job-events-data.js"></script>
  <script src="js/data/jobs/labor-job-events-data.js"></script>
  <script src="js/data/jobs/advanced-job-events-data.js"></script>
  <script src="js/data/jobs/job-events-data.js"></script>
  <script src="js/data/constants.js"></script>
  <script src="js/data/characters.js"></script>
  <script src="js/data/npcs/npc-data.js"></script>
  <script src="js/data/npcs/npc-dialogue-data.js"></script>
  <script src="js/data/days/day01/story.js"></script>
  <script src="js/data/days/day01/events.js"></script>
  <script src="js/data/days/day01/world.js"></script>
  <script src="js/data/days/day01/index.js"></script>
  <script src="js/data/days/day02/index.js"></script>
  <script src="js/data/days/day03/index.js"></script>
  <script src="js/data/days/day04/index.js"></script>
  <script src="js/data/days/day05/index.js"></script>
  <script src="js/data/days/day06/index.js"></script>
  <script src="js/data/days/day07/index.js"></script>
  <script src="js/data/days/index.js"></script>
  <script src="js/data/economy/economy-calendar.js"></script>
  <script src="js/systems/economy/wallet-service.js"></script>
  <script src="js/systems/economy/economy-service.js"></script>
  <script src="js/systems/memory/memory-service.js"></script>
  <script src="js/systems/npc/dialogue-service.js"></script>
  <script src="js/systems/ranking-service.js"></script>
  <script src="js/devices/phone/phone-session.js"></script>
  <script src="js/apps/app-ui-helpers.js"></script>
  <script src="js/apps/jobs/jobs-app-state.js"></script>
  <script src="js/apps/jobs/jobs-app-ui.js"></script>
  <script src="js/apps/jobs/jobs-manifest.js"></script>
  <script src="js/apps/dis/dis-manifest.js"></script>
  <script src="js/apps/playstore/playstore-manifest.js"></script>
  <script src="js/apps/call/call-manifest.js"></script>
  <script src="js/apps/gallery/gallery-manifest.js"></script>
  <script src="js/apps/bank/bank-app-state.js"></script>
  <script src="js/apps/bank/bank-manifest.js"></script>
  <script src="js/apps/stocks/stocks-manifest.js"></script>
  <script src="js/apps/delivery/delivery-manifest.js"></script>
  <script src="js/apps/video/video-manifest.js"></script>
  <script src="js/devices/phone/phone-app-registry.js"></script>
  <script src="js/devices/phone/phone-shell-ui.js"></script>
  <script src="js/devices/phone/phone-router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/dev.js"></script>
</body>
</html>
